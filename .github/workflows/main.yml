name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run Build in Subfolder
      run: |
        if [ -f "./build.gradle.kts" ] || [ -f "./build.gradle" ]; then
          gradle assembleDebug
        else
          # Agar files kisi subfolder ke andar hain toh use dhoondhein
          SUBFOLDER=$(find . -maxdepth 2 -name "settings.gradle.kts" -o -name "settings.gradle" | head -n 1 | xargs dirname)
          echo "Project found in subfolder: $SUBFOLDER"
          cd $SUBFOLDER
          gradle assembleDebug
        fi

    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NOVA-AI-Debug-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
        
